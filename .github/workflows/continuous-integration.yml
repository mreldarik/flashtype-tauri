name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "**"

jobs:
  changenotes:
    name: Changenotes
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Validate changenotes
        run: node scripts/validate-changes.mjs

  ci:
    strategy:
      matrix:
        os: [blacksmith-8vcpu-ubuntu-2404]
        version: [22]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
          cache: "pnpm"

      - name: Install Rust wasm tools
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: Install dependencies
        run: pnpm install

      - run: pnpm run ci

  macos-release-build-check:
    runs-on: blacksmith-12vcpu-macos-15
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_FOR_PULL_REQUEST: "true"
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Pnpm
        uses: pnpm/action-setup@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Rust wasm tools
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.108 --locked
          cargo install cargo-bash --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS assets
        run: pnpm run package:mac

      - name: Verify macOS app signature (diagnostic)
        run: |
          if [ -n "${CSC_LINK:-}" ]; then
            codesign --verify --deep --strict --verbose=2 release/mac-arm64/Flashtype.app
          else
            echo "Skipping signature verification because CSC_LINK is unavailable."
          fi

      - name: Test packaged macOS app
        run: pnpm run test:e2e:packaged-macos

      - name: Upload packaged macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-packaged-app-diagnostics
          if-no-files-found: ignore
          path: |
            release/*.dmg
            release/*.zip
            test-results
            playwright-report
